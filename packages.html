<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باقات ScrollyTale Studio</title>
    <style>
        :root {
            --bg-page: #020205;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.05);
            
            --color-free: #94a3b8;
            --color-starter: #00f2fe;
            --color-pro: #10b981;
            --color-agency: #a855f7;
            
            --text-bright: #ffffff;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-page);
            color: var(--text-bright);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 30px 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 {
            font-size: 2.2rem; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #64748b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-section p { color: var(--text-muted); font-size: 1.1rem; }

        .packages-grid {
            display: grid; max-width: 1200px; margin: 0 auto;
            grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: stretch;
        }

        .package-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 24px; display: flex; flex-direction: column;
            justify-content: space-between; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .package-card:hover {
            transform: translateY(-5px); border-color: rgba(255,255,255,0.15);
            background: rgba(255, 255, 255, 0.04); box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .package-card.popular {
            border-color: var(--color-pro);
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.03) 0%, rgba(255,255,255,0.01) 100%);
        }

        .badge-popular {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--color-pro); color: #000; padding: 4px 14px;
            border-radius: 20px; font-size: 0.75rem; font-weight: 800; white-space: nowrap;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .pack-title { font-size: 1.3rem; font-weight: 800; color: var(--text-bright); margin-bottom: 6px; }
        .pack-price { font-size: 2rem; font-weight: 900; margin-bottom: 12px; display: flex; align-items: baseline; gap: 4px; }
        .pack-price span { font-size: 0.9rem; font-weight: 500; color: var(--text-muted); }
        .pack-target { font-size: 0.85rem; font-weight: 700; background: rgba(255,255,255,0.06); padding: 6px 10px; border-radius: 8px; display: inline-block; margin-bottom: 15px; width: fit-content; }
        .pack-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 20px; }

        .features-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .features-list li { font-size: 0.88rem; color: #cbd5e1; display: flex; align-items: center; gap: 8px; }
        
        /* ضبط محاذاة الأيقونات بناء على اتجاه الصفحة */
        html[dir="rtl"] .features-list li::before { content: '✦'; color: var(--color-starter); }
        html[dir="ltr"] .features-list li::before { content: '✦'; color: var(--color-starter); }
        .package-card.popular .features-list li::before { color: var(--color-pro); }

        .btn-purchase {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-size: 0.95rem; font-weight: 700; border-radius: 12px; cursor: pointer;
            text-decoration: none; text-align: center; transition: all 0.25s ease;
        }
        .btn-purchase:hover { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .package-card[data-pack="starter"] .btn-purchase:hover { background: var(--color-starter); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); border-color: var(--color-starter); }
        .package-card[data-pack="pro"] .btn-purchase { background: var(--color-pro); color: #000; font-weight: 800; border: none;}
        .package-card[data-pack="pro"] .btn-purchase:hover { background: #12d192; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .package-card[data-pack="agency"] .btn-purchase:hover { background: var(--color-agency); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-color: var(--color-agency); }

        .btn-purchase.current-plan-btn {
            background: rgba(255, 255, 255, 0.08) !important;
            color: #cbd5e1 !important;
            border: 1px dashed rgba(255, 255, 255, 0.3) !important;
            cursor: default !important;
            pointer-events: none;
            box-shadow: none !important;
            transform: none !important;
        }

        @media (max-width: 900px) {
            .packages-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .package-card { padding: 20px 18px; border-radius: 14px; }
            .pack-title { font-size: 1.2rem; }
            .pack-price { font-size: 1.8rem; margin-bottom: 8px; }
            .pack-target { font-size: 0.8rem; padding: 4px 8px; margin-bottom: 10px; }
            .pack-desc { font-size: 0.85rem; margin-bottom: 12px; }
            .features-list { gap: 8px; margin-bottom: 20px; padding-top: 10px; }
            .features-list li { font-size: 0.85rem; }
            .btn-purchase { font-size: 0.9rem; padding: 12px; border-radius: 8px; }
            .badge-popular { font-size: 0.7rem; padding: 4px 12px; top: -11px; }
        }

        @media (max-width: 600px) {
            .packages-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header-section">
        <h1 id="main-title">ترقية الإمكانيات الإبداعية</h1>
        <p id="main-desc">اختر الخطة المثالية لرحلتك السينمائية داخل عالم السرد البصري.</p>
    </header>

    <!-- تم تحويل بناء الكروت بالكامل ليكون ديناميكياً بناءً على ملف اللغة -->
    <main class="packages-grid" id="packages-container"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlIHbsLSdF7I3QU0tkChUyviTWc13ctec",
            authDomain: "scrollytale.firebaseapp.com",
            projectId: "scrollytale",
            storageBucket: "scrollytale.firebasestorage.app",
            messagingSenderId: "294561535270",
            appId: "1:294561535270:web:e051f9a58b881bbc341de7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // [1] محرك اللغات الديناميكي i18n لصفحة الباقات
        const urlParams = new URLSearchParams(window.location.search);
        const currentLang = urlParams.get('lang') || 'ar';

        const i18n = {
            ar: {
                title: "باقات ScrollyTale Studio",
                mainTitle: "ترقية الإمكانيات الإبداعية",
                mainDesc: "اختر الخطة المثالية لرحلتك السينمائية داخل عالم السرد البصري.",
                popularBadge: "🔥 الأكثر طلباً ومبيعاً",
                currentPlanText: "✓ خطتك الحالية",
                alertExpired: "انتهت صلاحية باقتك الحالية (30 يوماً)، تم إعادتك للباقة المجانية.",
                plans: {
                    free: {
                        title: "باقة الحكواتي الحر",
                        price: "0$", period: "/ للأبد",
                        target: "🎯 المستهدف: الهواة والمستكشفين",
                        desc: "تذوق سحر التحريك السينمائي وابدأ خطواتك الأولى بدون أي تكاليف مادية.",
                        btn: "ابدأ التجربة مجاناً",
                        features: [
                            "مشروع واحد (1) نشط بالكامل",
                            "قالبان سينمائيان (2) للعمل",
                            "تصدير الكود النظيف للموقع",
                            "<span style='color: #ef4444;'>❌ شعار المنصة إلزامي بالأسفل</span>"
                        ]
                    },
                    starter: {
                        title: "الحكواتي الناشئ",
                        price: "7$", period: "/ شهرياً",
                        target: "🎯 المستهدف: الطلاب والمصممين الجدد",
                        desc: "مثالية لبناء بورتفوليو شخصي مميز وجذب عملائك الأوائل بأسلوب فريد.",
                        btn: "احصل على الباقة",
                        features: [
                            "مشروعين (2) نشطين في نفس الوقت",
                            "الوصول إلى 5 قوالب سينمائية",
                            "تصدير الكود البرمجي بالكامل",
                            "<span style='color: #eab308;'>⚠️ شعار المنصة موجود (لكن صغير جداً)</span>"
                        ]
                    },
                    pro: {
                        title: "المخرج السينمائي",
                        price: "19$", period: "/ شهرياً",
                        target: "🎯 المستهدف: الـ Freelancers والمحترفين",
                        desc: "الحصان الرابح لكل مصمم ومطور يريد كسر الجمود وبناء مشاريع تجارية بلا قيود.",
                        btn: "احصل على الباقة",
                        features: [
                            "مشاريع غير محدودة (Unlimited)",
                            "ربط دومين خاص (Custom Domain)",
                            "الوصول الكامل لكل القوالب الحالية والمستقبلية",
                            "إزالة شعار المنصة تماماً (White-Label)"
                        ]
                    },
                    agency: {
                        title: "الاستوديو الخارق",
                        price: "49$", period: "/ شهرياً",
                        target: "🎯 المستهدف: الوكالات وفرق العمل",
                        desc: "القوة القصوى لشركات التسويق والبرمجة التي تدير مشاريع عملاء ضخمة ومتعددة.",
                        btn: "احصل على الباقة",
                        features: [
                            "كل مميزات باقة المخرج السينمائي",
                            "إضافة فريق عمل (حتى 5 مصممين)",
                            "لوحة تحكم مخصصة بشعار وكالتك",
                            "إحصائيات تدوير الشاشة (Scroll Analytics)",
                            "دعم فني VIP مباشر وسريع"
                        ]
                    }
                }
            },
            en: {
                title: "ScrollyTale Studio Plans",
                mainTitle: "Upgrade Your Creative Potential",
                mainDesc: "Choose the perfect plan for your cinematic journey into visual storytelling.",
                popularBadge: "🔥 Most Popular & Best Seller",
                currentPlanText: "✓ Your Current Plan",
                alertExpired: "Your current plan has expired (30 days). You have been reverted to the Free plan.",
                plans: {
                    free: {
                        title: "Free Storyteller",
                        price: "$0", period: "/ Forever",
                        target: "🎯 Target: Hobbyists & Explorers",
                        desc: "Taste the magic of cinematic animation and take your first steps with zero costs.",
                        btn: "Start Free Trial",
                        features: [
                            "1 Fully Active Project",
                            "2 Cinematic Templates",
                            "Clean Code Export",
                            "<span style='color: #ef4444;'>❌ Platform Watermark Required</span>"
                        ]
                    },
                    starter: {
                        title: "Starter Storyteller",
                        price: "$7", period: "/ Monthly",
                        target: "🎯 Target: Students & New Designers",
                        desc: "Perfect for building a stunning personal portfolio and attracting your first clients.",
                        btn: "Get Started",
                        features: [
                            "2 Active Projects Simultanously",
                            "Access to 5 Cinematic Templates",
                            "Full Source Code Export",
                            "<span style='color: #eab308;'>⚠️ Mini Platform Watermark Included</span>"
                        ]
                    },
                    pro: {
                        title: "Cinematic Director",
                        price: "$19", period: "/ Monthly",
                        target: "🎯 Target: Freelancers & Professionals",
                        desc: "The ultimate choice for designers & developers to build unlimited commercial projects.",
                        btn: "Get Pro Pack",
                        features: [
                            "Unlimited Projects",
                            "Custom Domain Integration",
                            "Full Access to Current & Future Templates",
                            "Complete Watermark Removal (White-Label)"
                        ]
                    },
                    agency: {
                        title: "Super Studio",
                        price: "$49", period: "/ Monthly",
                        target: "🎯 Target: Agencies & Teams",
                        desc: "Maximum power for marketing and dev agencies managing large, multi-client projects.",
                        btn: "Get Agency Pack",
                        features: [
                            "All Cinematic Director Features",
                            "Team Collaboration (Up to 5 Designers)",
                            "Custom Dashboard with Your Logo",
                            "Advanced Scroll Analytics",
                            "VIP Direct Priority Support"
                        ]
                    }
                }
            }
        };

        // [2] تطبيق اللغة الحالية وضبط الواجهة الأساسية
        const langData = i18n[currentLang];
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.title = langData.title;
        document.getElementById('main-title').innerText = langData.mainTitle;
        document.getElementById('main-desc').innerText = langData.mainDesc;

        // [3] بناء شبكة الباقات برمجياً لدعم اللغتين بدون تكرار الكود
        const gridContainer = document.getElementById('packages-container');
        
        Object.keys(langData.plans).forEach(key => {
            const plan = langData.plans[key];
            const isPopular = key === 'pro';
            
            const cardHTML = `
                <div class="package-card ${isPopular ? 'popular' : ''}" data-pack="${key}">
                    ${isPopular ? `<div class="badge-popular">${langData.popularBadge}</div>` : ''}
                    <div>
                        <h2 class="pack-title">${plan.title}</h2>
                        <div class="pack-price" style="color: var(--color-${key});">${plan.price} <span>${plan.period}</span></div>
                        <div class="pack-target">${plan.target}</div>
                        <p class="pack-desc">${plan.desc}</p>
                        <ul class="features-list">
                            ${plan.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>
                    <a href="checkout.html?plan=${key}&lang=${currentLang}" class="btn-purchase">${plan.btn}</a>
                </div>
            `;
            gridContainer.insertAdjacentHTML('beforeend', cardHTML);
        });

        // [4] مراقبة حالة الحساب والمزامنة مع الخطط المشتراة
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const storageKey = `scrolly_plan_${user.uid}`;
                let savedData = JSON.parse(localStorage.getItem(storageKey));
                let currentPlan = 'free';

                if (savedData) {
                    const currentTime = Date.now();
                    if (currentTime > savedData.expiryDate) {
                        alert(langData.alertExpired);
                        localStorage.removeItem(storageKey);
                        currentPlan = 'free';
                    } else {
                        currentPlan = savedData.planName;
                    }
                }
                updateUIWithActivePlan(currentPlan);
            } else {
                updateUIWithActivePlan('free');
            }
        });

        // [5] دالة تحديث شكل الباقة النشطة (قفلها وتغيير النص)
        function updateUIWithActivePlan(plan) {
            document.querySelectorAll('.btn-purchase').forEach(btn => {
                btn.classList.remove('current-plan-btn');
                const pKey = btn.closest('.package-card').getAttribute('data-pack');
                btn.innerText = langData.plans[pKey].btn;
            });

            const activeCard = document.querySelector(`.package-card[data-pack="${plan}"]`);
            if (activeCard) {
                const purchaseBtn = activeCard.querySelector('.btn-purchase');
                if (purchaseBtn) {
                    purchaseBtn.innerHTML = langData.currentPlanText;
                    purchaseBtn.removeAttribute('href');
                    purchaseBtn.classList.add('current-plan-btn');
                }
            }
        }
    </script>
</body>
</html>
