<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">ScrollyTale Studio - لوحة التحكم العالمية</title>
    <style>
        /* ==========================================================================
           1. التأسيس والمتغيرات الديناميكية (تتغير فوراً من الإعدادات!)
           ========================================================================== */
        :root {
            --bg-dashboard: #03030a;
            --glass-nav: rgba(8, 8, 20, 0.75);
            --neon-active: #00f2fe; /* اللون الافتراضي */
            --neon-glow: rgba(0, 242, 254, 0.2);
            --text-muted: #64748b;
            --text-bright: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-dashboard);
            color: var(--text-bright);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ==========================================================================
           2. شريط التنقل المتجاوب الذكي (Responsive Global Navbar)
           ========================================================================== */
        .global-navbar {
            background: var(--glass-nav);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 30px;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 900;
            white-space: nowrap;
        }
        .nav-logo span {
            color: var(--neon-active);
            text-shadow: 0 0 15px var(--neon-glow);
            transition: color 0.3s;
        }

        /* حاوية التبويبات الرئيسية الوسطى */
        .tabs-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .tabs-container {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 22px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: var(--text-bright);
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 15px var(--neon-glow);
            border-bottom: 2px solid var(--neon-active);
        }

        /* قسم الأدوات المعزول (إعدادات + خروج) */
        .utility-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* زر الإعدادات الفخم المنفصل */
        .btn-settings {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            width: 42px; height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .btn-settings.active {
            color: var(--neon-active);
            border-color: var(--neon-active);
            box-shadow: 0 0 15px var(--neon-glow);
            background: rgba(0, 242, 254, 0.05);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #f43f5e;
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: #f43f5e;
            color: #fff;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
        }

        /* ==========================================================================
           3. حاوية المحتوى المزدوجة (Iframe للروابط / Div للإعدادات)
           ========================================================================== */
        .main-content-area {
            flex: 1;
            position: relative;
            background: #010103;
        }

        #main-viewport {
            width: 100%; height: 100%;
            border: none;
            transition: opacity 0.2s ease;
        }

        /* لوحة الإعدادات المدمجة الخرافية (Inline Panel) */
        #settings-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #04040c;
            z-index: 50;
            padding: 40px;
            overflow-y: auto;
            display: none; /* مخفية افتراضياً */
        }
        #settings-panel.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        .settings-grid {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .settings-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .settings-card h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* أزرار اختيار الألوان واللغات */
        .options-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .opt-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .opt-btn.selected {
            border-color: var(--neon-active);
            color: #fff;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        /* دوائر مخصصة للألوان السحرية */
        .color-dot {
            width: 24px; height: 24px; border-radius: 50%; display: inline-block;
        }

        /* ==========================================================================
           4. الهيكلة الخاصة بالجوالات والتابلت (Responsive Engine) - تم التحديث والإصلاح بالكامل 🚀
           ========================================================================== */
        @media (max-width: 900px) {
            .global-navbar {
                height: auto;
                flex-direction: column;
                padding: 12px;
                gap: 12px;
                align-items: stretch;
            }

            /* سطر علوي يحتوي على الشعار وأزرار التحكم معاً لتوفير المساحة ومنع التداخل */
            .global-navbar {
                display: grid;
                grid-template-columns: 1fr auto;
                align-items: center;
            }

            .nav-logo {
                font-size: 1.2rem;
                grid-column: 1;
            }

            .utility-controls {
                position: static !important; /* إلغاء التموضع المطلق المسبب للمشاكل */
                grid-column: 2;
                gap: 8px;
            }

            .btn-settings {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                font-size: 1rem;
            }

            .btn-logout {
                padding: 6px 12px;
                font-size: 0.8rem;
                border-radius: 8px;
            }

            /* حاوية التبويبات تأخذ السطر السفلي بالكامل بشكل منفصل */
            .tabs-wrapper {
                grid-column: 1 / span 2;
                width: 100%;
                justify-content: flex-start;
                margin-top: 4px;
            }

            /* تحويل التبويبات لشريط سحب أفقي ناعم جداً ومستقر */
            .tabs-container {
                width: 100%;
                overflow-x: auto;
                white-space: nowrap;
                display: flex;
                flex-wrap: nowrap; /* منع نزول التبويبات لسطر جديد */
                gap: 4px;
                padding: 4px;
                scrollbar-width: none; /* إخفاء شريط التمرير للـ Firefox */
                -webkit-overflow-scrolling: touch;
            }
            
            .tabs-container::-webkit-scrollbar {
                display: none; /* إخفاء شريط التمرير للـ Chrome والـ Safari */
            }

            .tab-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
                flex: 0 0 auto; /* منع انكماش الأزرار لكي تظهر كاملة عند السحب */
                border-radius: 8px;
            }

            #settings-panel {
                padding: 20px 15px;
            }

            .settings-card {
                padding: 16px;
                border-radius: 14px;
            }

            .settings-grid h2 {
                font-size: 1.5rem !important;
            }

            .opt-btn {
                padding: 10px 16px;
                font-size: 0.85rem;
                border-radius: 10px;
                flex: 1 1 calc(50% - 10px); /* توزيع مرن للأزرار داخل الإعدادات */
                text-align: center;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="global-navbar">
        <div class="nav-logo">Scrolly<span>Tale</span> Studio</div>

        <div class="tabs-wrapper">
            <nav class="tabs-container" id="main-tabs-nav">
                <button class="tab-btn active" data-target="templates.html" id="tab-templates">🎨 القوالب</button>
                <button class="tab-btn" data-target="projects.html" id="tab-projects">📁 مشاريعك</button>
                <button class="tab-btn" data-target="inquiries.html" id="tab-inquiries">💬 الاستفسارات</button>
                <button class="tab-btn" data-target="packages.html" id="tab-packages">💎 الباقات</button>
            </nav>
        </div>

        <div class="utility-controls">
            <button class="btn-settings" id="trigger-settings" title="الإعدادات">⚙️</button>
            <button class="btn-logout" id="btn-logout-cloud">خروج</button>
        </div>
    </header>

    <main class="main-content-area">
        <iframe id="main-viewport" src="templates.html" title="Dashboard Viewport"></iframe>

        <div id="settings-panel">
            <div class="settings-grid">
                <h2 style="font-size: 2rem; margin-bottom: 10px;" id="settings-main-title">⚙️ الإعدادات العالمية</h2>
                <p style="color: #64748b; margin-bottom: 20px;" id="settings-sub-title">قم بتخصيص بيئة العمل الخاصة بك لتناسب أسلوب إبداعك.</p>

                <div class="settings-card">
                    <h3 id="theme-card-title">🎨 لون الهوية (Neon Theme)</h3>
                    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 15px;" id="theme-card-desc">اختر اللون المضيء للوحة التحكم الخاصة بك:</p>
                    <div class="options-row">
                        <button class="opt-btn selected" onclick="changeThemeColor('#00f2fe', 'rgba(0, 242, 254, 0.2)', this)">
                            <span class="color-dot" style="background: #00f2fe;"></span> <span class="lang-color1">سايبر سيان</span>
                        </button>
                        <button class="opt-btn" onclick="changeThemeColor('#10b981', 'rgba(16, 185, 129, 0.2)', this)">
                            <span class="color-dot" style="background: #10b981;"></span> <span class="lang-color2">ماتركس أخضر</span>
                        </button>
                        <button class="opt-btn" onclick="changeThemeColor('#a855f7', 'rgba(168, 85, 247, 0.2)', this)">
                            <span class="color-dot" style="background: #a855f7;"></span> <span class="lang-color3">الماجنتا الملكي</span>
                        </button>
                    </div>
                </div>

                <div class="settings-card">
                    <h3 id="lang-card-title">🌐 لغة المنصة</h3>
                    <div class="options-row">
                        <button class="opt-btn" id="lang-btn-ar" onclick="changeLanguage('ar')">العربية (RTL)</button>
                        <button class="opt-btn" id="lang-btn-en" onclick="changeLanguage('en')">English (LTR)</button>
                    </div>
                </div>

                <div class="settings-card">
                    <h3 id="view-card-title">👁️ وضع الرؤية والمظهر</h3>
                    <div class="options-row">
                        <button class="opt-btn selected" id="view-btn-dark">سماوي داكن الفخامة (Deep Dark)</button>
                        <button class="opt-btn" id="view-btn-light" onclick="alert(currentLang === 'ar' ? 'مطور الويب الحقيقي لا يستخدم الوضع المضيء ☀️ حفاظاً على عينيه! 😉' : 'Real web developers don\'t use light mode ☀️ to save their eyes! 😉')">الوضع المضيء (خيار غير مستحب)</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlIHbsLSdF7I3QU0tkChUyviTWc13ctec",
            authDomain: "scrollytale.firebaseapp.com",
            projectId: "scrollytale",
            storageBucket: "scrollytale.firebasestorage.app",
            messagingSenderId: "294561535270",
            appId: "1:294561535270:web:e051f9a58b881bbc341de7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const viewport = document.getElementById('main-viewport');
        const settingsPanel = document.getElementById('settings-panel');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const btnSettings = document.getElementById('trigger-settings');

        // قاموس الترجمات للوحة التحكم
        const i18n = {
            ar: {
                pageTitle: "ScrollyTale Studio - لوحة التحكم العالمية",
                tabTemplates: "🎨 القوالب",
                tabProjects: "📁 مشاريعك",
                tabInquiries: "💬 الاستفسارات",
                tabPackages: "💎 الباقات",
                logoutBtn: "خروج",
                logoutConfirm: "هل تريد تسجيل الخروج والعودة لبوابة التأمين؟",
                settingsMainTitle: "⚙️ الإعدادات العالمية",
                settingsSubTitle: "قم بتخصيص بيئة العمل الخاصة بك لتناسب أسلوب إبداعك.",
                themeCardTitle: "🎨 لون الهوية (Neon Theme)",
                themeCardDesc: "اختر اللون المضيء للوحة التحكم الخاصة بك:",
                color1: "سايبر سيان", color2: "ماتركس أخضر", color3: "الماجنتا الملكي",
                langCardTitle: "🌐 لغة المنصة",
                viewCardTitle: "👁️ وضع الرؤية والمظهر",
                viewBtnDark: "سماوي داكن الفخامة (Deep Dark)",
                viewBtnLight: "الوضع المضيء (خيار غير مستحب)"
            },
            en: {
                pageTitle: "ScrollyTale Studio - Global Dashboard",
                tabTemplates: "🎨 Templates",
                tabProjects: "📁 Your Projects",
                tabInquiries: "💬 Inquiries",
                tabPackages: "💎 Plans & Packages",
                logoutBtn: "Logout",
                logoutConfirm: "Do you want to sign out and return to the login secure gateway?",
                settingsMainTitle: "⚙️ Global Settings",
                settingsSubTitle: "Customize your environment to perfectly fit your creative flow.",
                themeCardTitle: "🎨 Identity Color (Neon Theme)",
                themeCardDesc: "Select the glowing color theme for your dashboard:",
                color1: "Cyber Cyan", color2: "Matrix Green", color3: "Royal Magenta",
                langCardTitle: "🌐 Platform Language",
                viewCardTitle: "👁️ Interface Vision Mode",
                viewBtnDark: "Deep Dark Luxury",
                viewBtnLight: "Light Mode (Not recommended)"
            }
        };

        // لغة النظام الحالية
        window.currentLang = localStorage.getItem('scrolly_lang') || 'ar';

        // [1] حارس البوابة المطور مع مهلة أمان لمنع الطرد الخاطئ عند التحميل السريع
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "auth.html";
                    }
                }, 1000);
            }
        });

        // [2] التنقل بين الأزرار الرئيسية وإغلاق الإعدادات تلقائياً عند فتح صفحة أخرى
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                document.querySelector('.tab-btn.active')?.classList.remove('active');
                btnSettings.classList.remove('active'); 
                settingsPanel.classList.remove('active'); 
                
                button.classList.add('active');
                viewport.style.opacity = '0';

                setTimeout(() => {
                    // نقوم بتمرير معيار اللغة في الرابط ليتوافق المتصفح الداخلي مع اللغة الحالية
                    const targetPage = button.getAttribute('data-target');
                    viewport.src = targetPage + `?lang=${window.currentLang}`;
                    viewport.style.display = 'block';
                    viewport.style.opacity = '1';
                }, 150);
            });
        });

        // [3] كود زر الإعدادات المعزول (Inline Trigger)
        btnSettings.addEventListener('click', () => {
            document.querySelector('.tab-btn.active')?.classList.remove('active');
            btnSettings.classList.add('active');
            viewport.style.display = 'none'; 
            settingsPanel.classList.add('active'); 
        });

        // [4] تسجيل الخروج الآمن
        document.getElementById('btn-logout-cloud').addEventListener('click', async () => {
            if(confirm(i18n[window.currentLang].logoutConfirm)) {
                await signOut(auth);
                window.location.href = "auth.html";
            }
        });

        // جعل دالة تغيير الألوان متاحة عالمياً للاستخدام في الـ onclick
        window.changeThemeColor = function(color, glow, element) {
            document.documentElement.style.setProperty('--neon-active', color);
            document.documentElement.style.setProperty('--neon-glow', glow);
            element.parentElement.querySelector('.opt-btn.selected').classList.remove('selected');
            element.classList.add('selected');
        }

        // دالة تبديل اللغات الحية للوحة الرئيسية
        window.changeLanguage = function(lang) {
            window.currentLang = lang;
            localStorage.setItem('scrolly_lang', lang);
            applyDashboardLanguage();
        }

        function applyDashboardLanguage() {
            const root = document.getElementById('html-root');
            const data = i18n[window.currentLang];

            // تحويل اتجاه الهيكل والـ Dir
            root.setAttribute('lang', window.currentLang);
            root.setAttribute('dir', window.currentLang === 'ar' ? 'rtl' : 'ltr');

            // ترجمة عناصر الواجهة
            document.getElementById('page-title').innerText = data.pageTitle;
            document.getElementById('tab-templates').innerText = data.tabTemplates;
            document.getElementById('tab-projects').innerText = data.tabProjects;
            document.getElementById('tab-inquiries').innerText = data.tabInquiries;
            document.getElementById('tab-packages').innerText = data.tabPackages;
            document.getElementById('btn-logout-cloud').innerText = data.logoutBtn;
            
            // نصوص لوحة الإعدادات
            document.getElementById('settings-main-title').innerText = data.settingsMainTitle;
            document.getElementById('settings-sub-title').innerText = data.settingsSubTitle;
            document.getElementById('theme-card-title').innerText = data.themeCardTitle;
            document.getElementById('theme-card-desc').innerText = data.themeCardDesc;
            document.querySelector('.lang-color1').innerText = data.color1;
            document.querySelector('.lang-color2').innerText = data.color2;
            document.querySelector('.lang-color3').innerText = data.color3;
            document.getElementById('lang-card-title').innerText = data.langCardTitle;
            document.getElementById('view-card-title').innerText = data.viewCardTitle;
            document.getElementById('view-btn-dark').innerText = data.viewBtnDark;
            document.getElementById('view-btn-light').innerText = data.viewBtnLight;

            // تحديث زر اللغة المختار بصرياً
            document.getElementById('lang-btn-ar').classList.remove('selected');
            document.getElementById('lang-btn-en').classList.remove('selected');
            document.getElementById(`lang-btn-${window.currentLang}`).classList.add('selected');

            // تحديث رابط الـ iframe النشط حالياً ليعكس اللغة الجديدة فوراً
            const currentTab = document.querySelector('.tab-btn.active');
            if (currentTab) {
                const targetPage = currentTab.getAttribute('data-target');
                viewport.src = targetPage + `?lang=${window.currentLang}`;
            }
        }

        // تشغيل الترجمة فور انتهاء تحميل العناصر
        window.addEventListener('DOMContentLoaded', () => {
            applyDashboardLanguage();
        });
    </script>
</body>
</html>
